name: Feature request
description: Suggest a scoped improvement
title: "[Feature]: "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: "Keep proposals free of proprietary workflows, policies, and data."
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What public, general problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
    validations:
      required: true
